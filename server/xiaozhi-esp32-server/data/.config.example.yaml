# Copy this file to data/.config.yaml and fill in your LAN IP, device MAC and API keys.
# Do not commit data/.config.yaml.

server:
  ip: 0.0.0.0
  port: 8001
  http_port: 8003
  websocket: ws://YOUR_MAC_LAN_IP:8001/xiaozhi/v1/
  vision_explain: http://YOUR_MAC_LAN_IP:8003/mcp/vision/explain
  auth:
    enabled: true
    allowed_devices:
      - "AA:BB:CC:DD:EE:FF"

selected_module:
  VAD: SileroVAD
  ASR: FunASR
  LLM: AliLLM
  VLLM: QwenVLVLLM
  TTS: EdgeTTS
  Memory: nomem
  Intent: function_call

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/

LLM:
  AliLLM:
    type: openai
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen-turbo
    api_key: YOUR_DASHSCOPE_API_KEY

TTS:
  EdgeTTS:
    type: edge
    voice: zh-CN-XiaoxiaoNeural
    output_dir: tmp/

Memory:
  nomem:
    type: nomem
